name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      # 与本地 `npm run verify:gates` 对齐：全量 Vitest + CRITICAL + E2E + miniprogram smoke
      - run: npx playwright install chromium --with-deps
      - run: npm run verify:gates
